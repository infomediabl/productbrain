<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Product Analyzer</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .chat-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 130px);
    }
    .chat-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .chat-selector select {
      flex: 1;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    #chat-area {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .chat-input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .chat-input-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .chat-input-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }
    #chat-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-dim);
      font-size: 15px;
      text-align: center;
      padding: 60px 20px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span> Analyzer</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/chat.html">Chat</a>
        <a href="/changelog.html">Changelog</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div class="chat-layout">
        <div class="chat-selector">
          <label for="container-select" style="font-weight:500;white-space:nowrap;">Container:</label>
          <select id="container-select" onchange="onContainerSelected()">
            <option value="">Loading...</option>
          </select>
        </div>

        <div id="chat-placeholder">
          Select a container above to start chatting about your data.
        </div>

        <div id="chat-area">
          <div id="chat-messages"></div>
          <div class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="Ask about your container data..."
              onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendChatMessage();}">
            <button class="btn btn-primary" id="chat-send-btn" onclick="sendChatMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/chat-page.js"></script>
</body>
</html>
