<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Data Feed - ProductBrain</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span>Brain</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back to Container</a>
      </div>

      <h2 id="page-title">User Data Feed</h2>

      <!-- Upload Section -->
      <div class="card" style="margin-bottom:24px;" id="upload-section">
        <h3 style="margin-bottom:12px;">Upload CSV</h3>
        <div id="drop-zone" style="border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:border-color 0.2s;">
          <div style="font-size:14px;color:var(--text-dim);margin-bottom:8px;">
            Drag &amp; drop a CSV file here, or click to browse
          </div>
          <input type="file" id="csv-file" accept=".csv,.tsv,.txt" style="display:none;">
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('csv-file').click()">Choose File</button>
        </div>
        <div id="upload-status" style="margin-top:12px;display:none;"></div>
      </div>

      <!-- Report Section (visible when feedId in URL) -->
      <div id="report-section" style="display:none;">
        <div class="card" style="margin-bottom:24px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div>
              <h3 id="feed-filename" style="margin-bottom:4px;"></h3>
              <span class="text-dim" style="font-size:12px;" id="feed-meta"></span>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-ghost btn-sm" onclick="deleteFeed()">Delete</button>
            </div>
          </div>

          <!-- Table Preview -->
          <div id="table-preview" style="margin-bottom:24px;overflow-x:auto;"></div>

          <!-- AI Analysis -->
          <div id="analysis-section" style="display:none;">
            <h3 style="margin-bottom:12px;">AI Analysis</h3>

            <div id="analysis-summary" class="card" style="margin-bottom:16px;padding:16px;background:var(--surface2);"></div>

            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;" id="metrics-grid"></div>

            <div id="insights-list" style="margin-bottom:16px;"></div>

            <div style="display:flex;gap:8px;">
              <button class="btn btn-primary btn-sm" onclick="pushAllToContext()">Push All to Context</button>
            </div>
          </div>

          <div id="analysis-status" style="display:none;"></div>
        </div>
      </div>

      <!-- Feed History -->
      <div class="card" id="history-section">
        <h3 style="margin-bottom:12px;">Feed History</h3>
        <div id="feed-history"></div>
      </div>
    </div>
  </main>
  <script src="/js/data-feed-page.js"></script>
</body>
</html>
