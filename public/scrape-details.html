<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrape Details - ProductBrain</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span>Brain</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/chat.html">Chat</a>
        <a href="/research-web.html">Research</a>
        <a href="/desire-spring.html">DesireSpring</a>

        <a href="/changelog.html">Changelog</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back to Container</a>
      </div>

      <div id="scrape-header" class="card" style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div>
            <h2 id="scrape-title">Loading...</h2>
            <div id="scrape-meta" class="text-dim" style="font-size:13px;margin-top:4px;"></div>
          </div>
          <div id="scrape-status-badge"></div>
        </div>
      </div>

      <div id="scrape-error" class="card" style="display:none;margin-bottom:24px;"></div>

      <div id="scrape-content"></div>
    </div>
  </main>

  <div class="lightbox" id="lightbox">
    <img src="" alt="Scraped image" id="lightbox-img">
  </div>

  <!-- Clone Ad Modal -->
  <div id="clone-modal" class="clone-modal-overlay" style="display:none;">
    <div class="clone-modal-dialog">
      <div class="clone-modal-header">
        <h3 style="margin:0;font-size:16px;">Clone Ad</h3>
        <button class="btn btn-ghost btn-sm" onclick="closeCloneModal()" style="font-size:18px;line-height:1;">&times;</button>
      </div>
      <div id="clone-ad-preview" class="clone-ad-preview"></div>
      <div class="clone-form">
        <div class="clone-form-row">
          <label>Model</label>
          <select id="clone-model"><option value="">Loading models...</option></select>
        </div>
        <div class="clone-form-row">
          <label>Format</label>
          <select id="clone-format">
            <option value="1:1">1:1 — Square Feed</option>
            <option value="9:16">9:16 — Vertical Story</option>
            <option value="16:9">16:9 — Horizontal Banner</option>
          </select>
        </div>
        <div class="clone-form-row">
          <label>Custom Instructions</label>
          <textarea id="clone-instructions" rows="3" placeholder="Optional: additional instructions for the AI..."></textarea>
        </div>
        <button id="clone-submit-btn" class="btn btn-primary" onclick="submitClone()" style="width:100%;margin-top:8px;">Generate Clone</button>
      </div>
      <div id="clone-result" class="clone-result" style="display:none;"></div>
    </div>
  </div>

  <style>
    /* Ad action buttons */
    .ad-action-buttons { display:flex; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
    .btn-ad-push, .btn-ad-clone { font-size:11px; padding:4px 10px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-dim); transition:all 0.15s; }
    .btn-ad-push:hover { border-color:var(--accent); color:var(--accent); }
    .btn-ad-clone { border-color:var(--accent); color:var(--accent); }
    .btn-ad-clone:hover { background:var(--accent); color:#fff; }
    .btn-ad-push:disabled, .btn-ad-clone:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-ad-push.pushed { border-color:#16a34a; color:#16a34a; }

    /* Clone modal */
    .clone-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
    .clone-modal-dialog { background:var(--surface); border:1px solid var(--border); border-radius:10px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:20px; }
    .clone-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .clone-ad-preview { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:12px; margin-bottom:16px; display:flex; gap:12px; align-items:flex-start; }
    .clone-ad-preview img { width:80px; height:80px; object-fit:cover; border-radius:4px; flex-shrink:0; }
    .clone-ad-preview .preview-text { font-size:12px; min-width:0; }
    .clone-ad-preview .preview-text strong { display:block; margin-bottom:4px; font-size:13px; }
    .clone-form-row { margin-bottom:12px; }
    .clone-form-row label { display:block; font-size:12px; font-weight:600; margin-bottom:4px; color:var(--text-dim); }
    .clone-form-row select, .clone-form-row textarea { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:6px; background:var(--surface2); color:var(--text); font-size:13px; font-family:inherit; }
    .clone-form-row textarea { resize:vertical; }
    .clone-result { margin-top:16px; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; }
    .clone-result img { max-width:100%; border-radius:6px; margin-bottom:10px; }
    .clone-result .adapted-copy { font-size:12px; }
    .clone-result .adapted-copy div { margin-bottom:4px; }
    .clone-spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; margin-right:6px; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>

  <script src="/js/scrape-details.js"></script>
</body>
</html>
