<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrape Details - Product Analyzer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span> Analyzer</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/chat.html">Chat</a>
        <a href="/changelog.html">Changelog</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back to Container</a>
      </div>

      <div id="scrape-header" class="card" style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div>
            <h2 id="scrape-title">Loading...</h2>
            <div id="scrape-meta" class="text-dim" style="font-size:13px;margin-top:4px;"></div>
          </div>
          <div id="scrape-status-badge"></div>
        </div>
      </div>

      <div id="scrape-error" class="card" style="display:none;margin-bottom:24px;"></div>

      <div id="scrape-content"></div>
    </div>
  </main>

  <div class="lightbox" id="lightbox">
    <img src="" alt="Scraped image" id="lightbox-img">
  </div>

  <script src="/js/scrape-details.js"></script>
</body>
</html>
