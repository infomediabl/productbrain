<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic AI - ProductBrain</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span>Brain</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/chat.html">Chat</a>
        <a href="/research-web.html">Research</a>
        <a href="/changelog.html">Changelog</a>
        <a href="/desire-spring.html">DesireSpring</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back</a>
        <div class="report-actions">
          <button id="print-btn" class="btn btn-ghost btn-sm" onclick="window.print()" style="display:none;">Print / Export PDF</button>
        </div>
      </div>
      <div id="status-bar" class="status-bar pending">
        <div class="spinner"></div>
        <span id="status-text">Loading proposal...</span>
      </div>
      <div id="proposal-content"></div>
      <div id="prompt-log-section" style="display:none;margin-top:24px;">
        <button class="btn btn-ghost btn-sm" onclick="togglePromptLog()" id="prompt-log-toggle">Show Prompt Log</button>
        <div id="prompt-log-content" style="display:none;margin-top:12px;"></div>
      </div>
    </div>
  </main>
  <div id="copy-toast" class="copy-toast">Copied to clipboard!</div>
  <script src="/js/proposal-report.js"></script>
</body>
</html>
