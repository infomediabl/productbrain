<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Ads - Product Analyzer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><span>Product</span> Analyzer</h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/chat.html">Chat</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back</a>
        <div class="report-actions">
          <button id="print-btn" class="btn btn-ghost btn-sm" onclick="window.print()" style="display:none;">Print / Export PDF</button>
        </div>
      </div>
      <div id="status-bar" class="status-bar pending">
        <div class="spinner"></div>
        <span id="status-text">Loading image ads...</span>
      </div>
      <div id="imgad-content"></div>
      <!-- Clone from Scraped Ads section -->
      <div id="clone-section" style="display:none;margin-top:24px;"></div>
      <div id="clone-result" style="display:none;margin-top:16px;"></div>
    </div>
  </main>
  <div id="copy-toast" class="copy-toast">Copied to clipboard!</div>
  <script src="/js/image-ads-report.js"></script>
</body>
</html>
