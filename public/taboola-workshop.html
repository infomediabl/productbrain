<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taboola Campaign Cloner - ProductBrain</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span>Brain</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back to Container</a>
      </div>

      <h2 id="page-title" style="margin-bottom:8px;">Taboola Campaign Cloner</h2>
      <p class="text-dim" style="font-size:13px;margin-bottom:24px;">Clone top-performing FB ads into live Taboola campaigns with AI-optimized copy.</p>

      <!-- Previous Campaigns -->
      <div class="card" style="margin-bottom:24px;">
        <h3 style="margin-bottom:12px;">Previous Campaigns</h3>
        <div id="taboola-list">
          <div class="text-dim" style="text-align:center;padding:24px;">Loading...</div>
        </div>
      </div>

      <!-- Launch New Campaign -->
      <div class="card" style="margin-bottom:24px;">
        <h3 style="margin-bottom:12px;">Launch New Campaign</h3>
        <div id="taboola-ad-selector">
          <div class="text-dim" style="text-align:center;padding:24px;">Loading ads...</div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/taboola-workshop.js"></script>
</body>
</html>
