<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Validator - ProductBrain</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span>Brain</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div style="margin-bottom:16px;">
        <a id="back-link" href="/" class="btn btn-ghost btn-sm">&larr; Back to Container</a>
      </div>

      <h2 id="page-title" style="margin-bottom:8px;">Content Validator</h2>
      <p class="text-dim" style="font-size:13px;margin-bottom:24px;">Brutally honest AI audit of your marketing assets against your product context.</p>

      <!-- ═══ FORM MODE ═══ -->
      <div id="form-mode">
        <!-- Container Context (collapsible, read-only) -->
        <div class="card" style="margin-bottom:24px;" id="context-section">
          <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="toggleContext()">
            <div style="display:flex;align-items:center;gap:8px;">
              <h3>Container Context</h3>
              <span id="context-count" class="badge" style="font-size:11px;background:var(--surface2);">0 items</span>
            </div>
            <span id="context-toggle" style="font-size:14px;color:var(--text-dim);transition:transform 0.2s;">&#9660;</span>
          </div>
          <div id="context-panel" style="display:none;margin-top:16px;">
            <div id="context-list">
              <div class="text-dim" style="text-align:center;padding:16px;font-size:13px;">Loading context...</div>
            </div>
          </div>
        </div>

        <!-- Validation Form -->
        <div class="card" style="margin-bottom:24px;">
          <h3 style="margin-bottom:16px;">Validate Content</h3>

          <div class="form-group" style="margin-bottom:16px;">
            <label style="font-weight:600;margin-bottom:6px;display:block;">Content Type</label>
            <div id="type-selector" style="display:flex;flex-wrap:wrap;gap:8px;">
              <label class="type-option" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;">
                <input type="radio" name="validate_type" value="hook" checked> Hook
              </label>
              <label class="type-option" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;">
                <input type="radio" name="validate_type" value="angle"> Angle
              </label>
              <label class="type-option" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;">
                <input type="radio" name="validate_type" value="image_ad"> Image Ad
              </label>
              <label class="type-option" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;">
                <input type="radio" name="validate_type" value="landing_page"> Landing Page
              </label>
              <label class="type-option" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;">
                <input type="radio" name="validate_type" value="video_transcript"> Video Transcript
              </label>
            </div>
          </div>

          <div class="form-group" style="margin-bottom:16px;">
            <label style="font-weight:600;margin-bottom:6px;display:block;">Content to Validate</label>
            <textarea id="content-input" rows="8" class="form-input" style="width:100%;font-family:inherit;resize:vertical;" placeholder="Paste your hook, angle, ad copy, landing page text, or video transcript here..."></textarea>
          </div>

          <div class="form-group" style="margin-bottom:16px;">
            <label style="font-weight:600;margin-bottom:6px;display:block;">Validation Comment <span class="text-dim" style="font-weight:400;">(optional)</span></label>
            <textarea id="comment-input" rows="2" class="form-input" style="width:100%;font-family:inherit;resize:vertical;" placeholder="Any specific aspects you want the AI to focus on..."></textarea>
          </div>

          <button id="validate-btn" class="btn btn-primary" onclick="runValidation()">Validate</button>
          <span id="validate-status" class="text-dim" style="margin-left:12px;font-size:13px;"></span>
        </div>

        <!-- Results History -->
        <div class="card" id="results-section">
          <h3 style="margin-bottom:16px;">Validation History</h3>
          <div id="results-list">
            <div class="text-dim" style="text-align:center;padding:16px;font-size:13px;">No validations yet.</div>
          </div>
        </div>
      </div>

      <!-- ═══ REPORT MODE ═══ -->
      <div id="report-mode" style="display:none;">
        <div id="report-content"></div>
      </div>

    </div>
  </main>
  <script src="/js/content-validator.js"></script>
</body>
</html>
