<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword Strategy - Product Analyzer</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .ks-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .ks-selector {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ks-selector select {
      flex: 1;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    #ks-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 15px;
      text-align: center;
      padding: 60px 20px;
    }
    #ks-main { display: none; }

    /* Form */
    .ks-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .ks-form .form-row {
      margin-bottom: 12px;
    }
    .ks-form label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .ks-form input[type="text"],
    .ks-form textarea,
    .ks-form select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .ks-form textarea { resize: vertical; }
    .ks-form input:focus,
    .ks-form textarea:focus,
    .ks-form select:focus { outline: none; border-color: var(--primary); }
    .ks-form .form-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }
    .ks-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .ks-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    /* Status */
    #ks-status { display: none; }

    /* Past strategies list */
    .ks-past {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .ks-past h4 { font-size: 14px; margin-bottom: 12px; }
    .ks-past-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .ks-past-item:last-child { border-bottom: none; }

    /* Results */
    #ks-results { display: none; }
    .ks-cluster {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid #7c3aed;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .ks-cluster-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .ks-cluster-name {
      font-size: 14px;
      font-weight: 600;
    }
    .ks-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/" style="color:inherit;text-decoration:none;"><span>Product</span> Analyzer</a></h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/guide.html">Guide</a>
        <a href="/chat.html">Chat</a>
        <a href="/changelog.html">Changelog</a>
        <a href="/add-container.html">New Container</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div class="ks-layout">
        <div class="ks-selector">
          <label for="ks-container-select" style="font-weight:500;white-space:nowrap;">Container:</label>
          <select id="ks-container-select" onchange="onContainerSelected()">
            <option value="">Loading...</option>
          </select>
        </div>

        <div id="ks-placeholder">
          Select a container above to generate or view keyword strategies.
        </div>

        <div id="ks-main">
          <!-- Form -->
          <div class="ks-form">
            <h4 style="font-size:14px;margin-bottom:14px;">Generate Keyword Strategy</h4>
            <div class="form-row">
              <label class="ks-checkbox">
                <input type="checkbox" id="ks-use-context" checked>
                Use Container Context
                <span class="text-dim" style="font-weight:400;">(curated insights from analyses)</span>
              </label>
            </div>
            <div class="form-row">
              <label>Niche / Market <span class="text-dim" style="font-weight:400;">(optional)</span></label>
              <input type="text" id="ks-niche" placeholder="e.g. organic skincare, B2B SaaS">
            </div>
            <div class="form-row">
              <label>Goals <span class="text-dim" style="font-weight:400;">(optional)</span></label>
              <textarea id="ks-goals" rows="3" placeholder="e.g. Drive organic traffic, improve ad ROI, rank for commercial keywords..."></textarea>
            </div>
            <div class="form-row">
              <label>Budget Level <span class="text-dim" style="font-weight:400;">(optional)</span></label>
              <select id="ks-budget">
                <option value="">Not specified</option>
                <option value="low">Low — Focus on organic / free tactics</option>
                <option value="medium">Medium — Mix of organic and paid</option>
                <option value="high">High — Aggressive paid + organic</option>
              </select>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" id="ks-generate-btn" onclick="submitKeywordForm()">Generate Strategy</button>
            </div>
          </div>

          <!-- Status bar -->
          <div id="ks-status" class="status-bar running" style="margin-top:12px;">
            <div class="spinner"></div>
            <span id="ks-status-text">AI is building keyword strategy...</span>
          </div>

          <!-- Results -->
          <div id="ks-results" style="margin-top:20px;"></div>

          <!-- Past strategies -->
          <div class="ks-past" style="margin-top:20px;">
            <h4>Past Strategies</h4>
            <div id="ks-past-list">
              <div class="text-dim" style="font-size:13px;">No strategies yet.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/keyword-strategy-page.js"></script>
</body>
</html>
